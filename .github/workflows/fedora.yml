name: "Fedora (Docker Compose)"
on:
  pull_request:
  push:
jobs:
  compose-fedora-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: docker/setup-compose-action@v2
    - name: Run using Docker Compose
      run: ./misc/integration/tasks/ci_compose.sh fedora/fedora-release
    - uses: actions/upload-artifact@v7
      with:
        path: installdir
        name: Fedora build artifact