name: "Docker"
on:
  pull_request:
  push:
jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: docker/setup-buildx-action@v4
    - uses: docker/setup-compose-action@v2
    - name: Run using Docker Compose
      run: docker compose up --build --force-recreate