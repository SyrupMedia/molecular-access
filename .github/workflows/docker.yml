name: "Docker"
on:
  pull_request:
  push:
jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: docker/setup-compose-action@v2
    - name: Run using Docker Compose
      run: docker compose up --build --force-recreate
  compose-fedora-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: docker/setup-compose-action@v2
    - name: Run using Docker Compose
      run: mkdir installdir && cd misc/containers/fedora/fedora-release && docker compose up --build --force-recreate
  compose-alpine-mingw:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: docker/setup-compose-action@v2
    - name: Run using Docker Compose
      run: mkdir installdir && cd misc/containers/alpine/mingw && docker compose up --build --force-recreate