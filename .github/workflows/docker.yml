name: "Docker"
on:
  pull_request:
  push:
jobs:
  fedora:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: docker/setup-buildx-action@v4
    - uses: docker/build-push-action@v7.1.0
      with:
        push: false
        tags: molaccess/molacccess-fedora-release:latest
        file: ./misc/containers/fedora/fedora-release/Dockerfile
    - uses: addnab/docker-run-action@v3
      with:
        image: molaccess/molacccess-fedora-release:latest