name: "Docker"
on:
  pull_request:
  push:
jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: docker/setup-compose-action@v2
    - name: Run using Docker Compose
      run: docker compose up --build --force-recreate

  compose-fedora-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: docker/setup-compose-action@v2
    - name: Run using Docker Compose
      run: sh misc/integration/tasks/ci_compose.sh fedora/fedora-release
    - uses: actions/upload-artifact@v7
      with:
        path: installdir
        name: Fedora build artifact

  compose-alpine-mingw:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: docker/setup-compose-action@v2
    - name: Run using Docker Compose
      run: sh misc/integration/tasks/ci_compose.sh alpine/mingw
    - uses: actions/upload-artifact@v7
      with:
        path: installdir
        name: MinGW build artifact  